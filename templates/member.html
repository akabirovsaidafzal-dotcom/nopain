{% extends "base.html" %}

{% block content %}
<section class="member-page-premium">
  <div class="member-bg-word">PROFILE</div>
  <div class="member-glow"></div>

  <div class="member-visual-card">
    <div class="member-photo-premium">
      <img src="{{ url_for('static', filename=person.photo) }}">
    </div>

    <div class="member-mini-stats">
      <div>
        <span>ROLE</span>
        <p>{{ person.name }}</p>
      </div>
      <div>
        <span>FOCUS</span>
        <p>Premium Visuals</p>
      </div>
    </div>
  </div>

  <div class="member-info-premium">
    <p class="tag">Team Profile</p>
    <h1>{{ person.name }}</h1>
    <h2>{{ person.role }}</h2>
    <p>{{ person.bio }}</p>

    <div class="member-skill-grid">
      {% for skill in person.skills %}
        <div class="skill-card">
          <span>0{{ loop.index }}</span>
          <p>{{ skill }}</p>
        </div>
      {% endfor %}
    </div>

    <div class="member-actions">
      <a href="/team" class="secondary-btn">Back to Team</a>
      <a href="/contact" class="cta">Start a Project</a>
    </div>
  </div>
</section>
{% endblock %}
